name: Tap Battle Example CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/tap_battle/**'
      - '!examples/tap_battle/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/tap_battle.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'examples/tap_battle/**'
      - '!examples/tap_battle/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/tap_battle.yml'

concurrency:
  group: tap-battle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/example_reusable.yml
    with:
      job_name: Tap Battle Example CI
      working_directory: examples/tap_battle
