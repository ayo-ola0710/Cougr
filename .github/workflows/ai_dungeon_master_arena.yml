name: AI Dungeon Master Arena Example CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/ai_dungeon_master_arena/**'
      - '!examples/ai_dungeon_master_arena/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/ai_dungeon_master_arena.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'examples/ai_dungeon_master_arena/**'
      - '!examples/ai_dungeon_master_arena/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/ai_dungeon_master_arena.yml'

concurrency:
  group: ai-dungeon-master-arena-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/example_reusable.yml
    with:
      job_name: AI Dungeon Master Arena Example CI
      working_directory: examples/ai_dungeon_master_arena
