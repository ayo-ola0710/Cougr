name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Build
      run: cargo build --verbose

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        target: wasm32-unknown-unknown
    
    - name: Install Stellar CLI
      run: |
        curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        stellar version
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-wasm-
    
    - name: Build WASM
      run: |
        cd examples/memory_match
        cargo build --release --target wasm32-unknown-unknown
        stellar contract build
    
    - name: Optimize WASM
      run: |
        cd examples/memory_match
        if command -v wasm-opt &> /dev/null; then
          for wasm in target/wasm32v1-none/release/*.wasm; do
            if [ -f "$wasm" ]; then
              wasm-opt -Oz "$wasm" -o "$wasm.optimized"
              mv "$wasm.optimized" "$wasm"
            fi
          done
        fi
    
    - name: Upload WASM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-contracts
        path: examples/memory_match/target/wasm32v1-none/release/*.wasm
        retention-days: 30

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit
    
    - name: Check for outdated dependencies
      run: cargo outdated --root-deps-only || echo "Some dependencies are outdated"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, build-wasm]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        target: wasm32-unknown-unknown
    
    - name: Install Stellar CLI
      run: |
        curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        stellar version
    
    - name: Download WASM artifacts
      uses: actions/download-artifact@v4
      with:
        name: wasm-contracts
        path: examples/memory_match/target/wasm32v1-none/release/
    
    - name: Run integration tests
      run: |
        cd examples/memory_match
        # Run integration tests
        cargo test --release

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Generate documentation
      run: cargo doc --no-deps --all-features
    
    - name: Check documentation links
      run: cargo doc --no-deps --all-features --document-private-items
    
    - name: Upload documentation
      uses: actions/upload-artifact@v4
      if: github.ref == 'refs/heads/main'
      with:
        name: documentation
        path: target/doc/
        retention-days: 30
