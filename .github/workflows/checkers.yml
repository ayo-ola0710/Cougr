name: Checkers CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/checkers/**'
      - '!examples/checkers/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/checkers.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'examples/checkers/**'
      - '!examples/checkers/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/checkers.yml'

concurrency:
  group: checkers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/example_reusable.yml
    with:
      job_name: Checkers CI
      working_directory: examples/checkers
