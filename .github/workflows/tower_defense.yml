name: Tower Defense Example CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/tower_defense/**'
      - '!examples/tower_defense/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/tower_defense.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'examples/tower_defense/**'
      - '!examples/tower_defense/**/*.md'
      - '.github/workflows/example_reusable.yml'
      - '.github/workflows/tower_defense.yml'

concurrency:
  group: tower-defense-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/example_reusable.yml
    with:
      job_name: Tower Defense Example CI
      working_directory: examples/tower_defense
