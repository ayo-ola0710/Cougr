name: Tower Defense CI

on:
  push:
    paths:
      - 'examples/tower_defense/**'
  pull_request:
    paths:
      - 'examples/tower_defense/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Rust
      uses: actions/setup-rust@v1
      with:
        rust-version: stable

    - name: Build contract
      run: |
        cd examples/tower_defense
        cargo build --target wasm32-unknown-unknown

    - name: Run tests
      run: |
        cd examples/tower_defense
        cargo test

    - name: Check formatting
      run: |
        cd examples/tower_defense
        cargo fmt --check

    - name: Run Clippy
      run: |
        cd examples/tower_defense
        cargo clippy --all-targets --all-features -- -D warnings